<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | CARJAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .thanks-wrap {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .thanks-box {
      text-align: center;
      max-width: 480px;
    }
    .thanks-icon {
      font-size: 3rem;
      color: var(--red);
      margin-bottom: 1.5rem;
    }
    .thanks-box h1 {
      font-size: 1.6rem;
      color: #fff;
      margin: 0 0 1rem;
    }
    .thanks-box p {
      color: #888;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .thanks-btn {
      display: inline-block;
      background: var(--red);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 0.8rem 2rem;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .thanks-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-mark">CJ</div>
    <div>
      <div class="nav-logo-text">CARJAM</div>
      <div class="nav-logo-sub">Japan Car Events</div>
    </div>
  </a>
</nav>

<div class="thanks-wrap">
  <div class="thanks-box">
    <div class="thanks-icon"><i class="ti ti-circle-check"></i></div>
    <h1>送信が完了しました</h1>
    <p>お問い合わせいただきありがとうございます。<br>内容を確認の上、折り返しご連絡いたします。</p>
    <a href="index.html" class="thanks-btn"><i class="ti ti-home" style="margin-right:6px"></i>トップに戻る</a>
  </div>
</div>

<footer class="footer">
  <div class="footer-bottom">
    <div>© 2026 CARJAM by 株式会社USDM. All Rights Reserved.</div>
    <div class="footer-bottom-right">

      <a href="privacy.html" class="footer-link">プライバシーポリシー</a>
    </div>
  </div>
</footer>

</html>
